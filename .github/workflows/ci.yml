name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  DOCKER_REPOSITORY: yellowseaa/promptworks

jobs:
  quality-check:
    name: 质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装 uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.5.0"

      - name: 安装 Python 依赖
        run: uv sync

      - name: 后端质量检查
        run: uv run poe test-all

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: 前端依赖安装
        run: npm ci
        working-directory: frontend

      - name: 前端构建
        run: npm run build
        working-directory: frontend

  release:
    name: 发布版本
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: write
    outputs:
      release_published: ${{ steps.release.outputs.release_published }}
      release_version: ${{ steps.release.outputs.release_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: 安装根目录依赖
        run: npm ci

      - name: 执行 semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BEFORE_VERSION=$(node -p "require('./package.json').version")
          npx semantic-release
          RELEASE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${RELEASE_VERSION}" != "${BEFORE_VERSION}" ]]; then
            echo "RELEASE_PUBLISHED=true" >> "$GITHUB_ENV"
            echo "release_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_PUBLISHED=false" >> "$GITHUB_ENV"
            echo "release_published=false" >> "$GITHUB_OUTPUT"
          fi
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

  docker:
    name: 构建并推送镜像
    needs: release
    runs-on: ubuntu-latest
    if: >
      needs.release.outputs.release_published == 'true'
    permissions:
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_tag }}

      - name: 启用 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 启用 Buildx
        uses: docker/setup-buildx-action@v4

      - name: 生成镜像标签
        id: tags
        run: |
          set -euo pipefail
          IMAGE_REVISION=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          TARGET_BRANCH="${GITHUB_REF##*/}"
          RELEASE_VERSION="${{ needs.release.outputs.release_version }}"

          if [[ "${TARGET_BRANCH}" == "main" ]]; then
            echo "channel=main" >> "$GITHUB_OUTPUT"
            BACKEND_TAGS="${DOCKER_REPOSITORY}:backend-main-${SHORT_SHA},${DOCKER_REPOSITORY}:backend-main-latest"
            FRONTEND_TAGS="${DOCKER_REPOSITORY}:frontend-main-${SHORT_SHA},${DOCKER_REPOSITORY}:frontend-main-latest"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            BACKEND_TAGS="${DOCKER_REPOSITORY}:backend-dev-${SHORT_SHA},${DOCKER_REPOSITORY}:backend-dev-latest"
            FRONTEND_TAGS="${DOCKER_REPOSITORY}:frontend-dev-${SHORT_SHA},${DOCKER_REPOSITORY}:frontend-dev-latest"
          fi

          BACKEND_TAGS="${BACKEND_TAGS},${DOCKER_REPOSITORY}:backend-v${RELEASE_VERSION}"
          FRONTEND_TAGS="${FRONTEND_TAGS},${DOCKER_REPOSITORY}:frontend-v${RELEASE_VERSION}"
          IMAGE_VERSION="v${RELEASE_VERSION}"

          echo "backend_tags=${BACKEND_TAGS}" >> "$GITHUB_OUTPUT"
          echo "frontend_tags=${FRONTEND_TAGS}" >> "$GITHUB_OUTPUT"
          echo "image_version=${IMAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_revision=${IMAGE_REVISION}" >> "$GITHUB_OUTPUT"

      - name: 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.backend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.image_revision }}
            org.opencontainers.image.version=${{ steps.tags.outputs.image_version }}

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.frontend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.image_revision }}
            org.opencontainers.image.version=${{ steps.tags.outputs.image_version }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.DOCKER_FRONTEND_API_BASE_URL || 'http://localhost:8000/api/v1' }}
